name: Flutter Android Build

on:
  push:
    branches:
      - main   # Run workflow only when pushing to main
    paths:
      - 'frontend/my_mobile_app/**'   # Trigger only when mobile app files change
  pull_request:
    paths:
      - 'frontend/my_mobile_app/**'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/my_mobile_app

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0' # change to your Flutter version

      # 3. Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 4. Analyze code
      - name: Analyze project
        run: flutter analyze

      # 5. Run tests
      - name: Run tests
        run: flutter test

      # 6. Build APK
      - name: Build APK
        run: flutter build apk --release

      # 7. Build App Bundle (Play Store ready)
      - name: Build App Bundle
        run: flutter build appbundle --release

      # 8. Upload artifacts so you can download them from GitHub Actions UI
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: |
            frontend/my_mobile_app/build/app/outputs/flutter-apk/app-release.apk
            frontend/my_mobile_app/build/app/outputs/bundle/release/app-release.aab
